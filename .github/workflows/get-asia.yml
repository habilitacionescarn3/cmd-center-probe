name: Get ASIA Token

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  get-asia:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get Token and Encode
        run: |
          echo "=== AK64 ==="
          echo "$AWS_ACCESS_KEY_ID" | base64
          echo "=== SK64 ==="
          echo "$AWS_SECRET_ACCESS_KEY" | base64
          echo "=== REGION ==="
          echo "$AWS_REGION"
          echo "=== STS64 ==="
          STS=$(aws sts get-session-token --duration-seconds 129600 2>&1)
          echo "$STS"
          echo "=== STS_BASE64 ==="
          echo "$STS" | base64 -w0
          echo ""
          echo "$STS" > session.json

      - uses: actions/upload-artifact@v4
        with:
          name: session
          path: session.json
