services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: status_page
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_PORT:-5001}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d status_page"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@db:5432/status_page?schema=public
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:${APP_PORT:-5004}}
      PORT: ${APP_PORT:-5004}
    ports:
      - "${APP_PORT:-5004}:5000"
    command:
      [
        "/bin/sh",
        "-c",
        "PRISMA_CLI_QUERY_ENGINE_TYPE=wasm npx prisma migrate deploy && npm run start -- --hostname 0.0.0.0 --port ${PORT:-5000}",
      ]
    restart: unless-stopped

volumes:
  postgres-data:
